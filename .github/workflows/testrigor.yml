name: TestRigor E2E Tests

on:
  push:
    branches:
      - stg-env
  pull_request:
    branches:
      - main
      - stg-env
  workflow_dispatch:

jobs:
  testrigor-tests:
    name: Run TestRigor Tests
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Netlify Deploy
        id: netlify-deploy
        uses: probablyup/wait-for-netlify-action@3.2.0
        with:
          site_id: ${{ (github.base_ref == 'stg-env' || github.ref_name == 'stg-env') && secrets.NETLIFY_STG_SITE_ID || secrets.NETLIFY_PROD_SITE_ID }}
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Determine Target URL
        id: target-url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" = "stg-env" ]; then
              echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--stg-tr-playground.netlify.app" >> $GITHUB_OUTPUT
            else
              echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--testrigorplayground.netlify.app" >> $GITHUB_OUTPUT
            fi
          else
            echo "url=${{ steps.netlify-deploy.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run TestRigor
        run: |
          #!/bin/bash

          # Realiza o disparo e salva a resposta JSON
          response_trigger=$(curl -s -X POST \
            -H 'Content-type: application/json' \
            -H 'auth-token: 21c8abac-a5b2-46a3-8ed2-07b2698274cb' \
            --data '{
              "forceCancelPreviousTesting": true,
              "branch": {
                "name": "${{ github.event.pull_request.head.ref || github.ref_name }}",
                "commit": "${{ github.event.pull_request.head.sha || github.sha }}"
              },
              "url": "${{ steps.target-url.outputs.url }}",
              "storedValues": { "storedValueName1": "Value" }
            }' \
            https://api.testrigor.com/api/v1/apps/A8T8G9NN24mJ9zbe6/retest)

          # Extrai o ID da run (taskId)
          run_id=$(echo "$response_trigger" | jq -r '.taskId')
          echo "TestRigor Run ID: $run_id"

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "Failed to trigger TestRigor run. Response: $response_trigger"
            exit 1
          fi

          sleep 10

          while true
          do
            echo " "
            echo "==================================="
            echo " Checking run status"
            echo "==================================="
            
            response=$(curl -s -X GET "https://api.testrigor.com/api/v1/apps/A8T8G9NN24mJ9zbe6/runs/$run_id" \
              -H 'auth-token: 21c8abac-a5b2-46a3-8ed2-07b2698274cb' \
              -H 'Accept: application/json')
            
            status=$(echo "$response" | jq -r '.data.status')
            echo "Status: $status"
            
            case "$status" in
              "Passed")
                echo "Test finished successfully"
                exit 0
                ;;
              "Failed")
                echo "Test finished but failed"
                exit 1
                ;;
              "Canceled")
                echo "Test canceled"
                exit 1
                ;;
              "New"|"In progress"|"In queue"|"Queued")
                echo "Test is not finished yet"
                ;;
              *)
                echo "Unknown status: $status"
                echo "API Response: $response"
                ;;
            esac
            sleep 10
          done
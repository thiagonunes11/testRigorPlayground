name: TestRigor E2E Tests

on:
  push:
    branches:
      - stg-env
      - main
  workflow_dispatch:

jobs:
  testrigor-tests:
    name: Run TestRigor Tests
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Netlify Deploy
        id: netlify-deploy
        uses: probablyup/wait-for-netlify-action@3.2.0
        with:
          # Define Netlify Site ID based on the branch that received the push
          site_id: ${{ github.ref_name == 'stg-env' && secrets.NETLIFY_STG_SITE_ID || secrets.NETLIFY_PROD_SITE_ID }}
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Run TestRigor
        run: |
          #!/bin/bash

          # Trigger TestRigor run (without branch or url overrides)
          curl -X POST \
            -H 'Content-type: application/json' \
            -H 'auth-token: 21c8abac-a5b2-46a3-8ed2-07b2698274cb' \
            --data '{"forceCancelPreviousTesting":true,"storedValues":{"storedValueName1":"Value"}}' \
            https://api.testrigor.com/api/v1/apps/A8T8G9NN24mJ9zbe6/retest

          sleep 10

          while true
          do
            echo " "
            echo "==================================="
            echo " Checking run status"
            echo "==================================="
            # Poll status API
            response=$(curl -i -o - -s -X GET 'https://api.testrigor.com/api/v1/apps/A8T8G9NN24mJ9zbe6/status' -H 'auth-token: 21c8abac-a5b2-46a3-8ed2-07b2698274cb' -H 'Accept: application/json')
            code=$(echo "$response" | grep HTTP |  awk '{print $2}')
            body=$(echo "$response" | sed -n '/{/,/}/p')
            echo "Status code: " $code
            echo "Response: " $body
            case $code in
              4*|5*)
                # 400 or 500 errors
                echo "Error calling API"
                exit 1
                ;;
              200)
                # 200: successfully finished
                echo "Test finished successfully"
                exit 0
                ;;
              227|228)
                # 227: New - 228: In progress
                echo "Test is not finished yet"
                ;;
              229)
                # 229: Canceled
                echo "Test canceled"
                exit 1
                ;;
              230)
                # 230: Failed
                echo "Test finished but failed"
                exit 1
                ;;
              *)
                echo "Unknown status"
                exit 1
                ;;
            esac
            sleep 10
          done
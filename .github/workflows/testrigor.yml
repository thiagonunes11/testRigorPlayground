name: TestRigor E2E Tests

on:
  push:
    branches:
      - stg-env
  pull_request:
    branches:
      - main
      - stg-env
  workflow_dispatch:

jobs:
  testrigor-tests:
    name: Run TestRigor Tests
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Netlify Deploy
        id: netlify-deploy
        uses: probablyup/wait-for-netlify-action@3.2.0
        with:
          site_id: ${{ (github.base_ref == 'stg-env' || github.ref_name == 'stg-env') && secrets.NETLIFY_STG_SITE_ID || secrets.NETLIFY_PROD_SITE_ID }}
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Determine Target URL
        id: target-url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" = "stg-env" ]; then
              echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--stg-tr-playground.netlify.app" >> $GITHUB_OUTPUT
            else
              echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--testrigorplayground.netlify.app" >> $GITHUB_OUTPUT
            fi
          else
            echo "url=${{ steps.netlify-deploy.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run TestRigor
        run: |
          curl -X POST \
            -H 'Content-type: application/json' \
            -H 'auth-token: ${{ secrets.TESTRIGOR_AUTH_TOKEN }}' \
            --data '{
              "forceCancelPreviousTesting": true,
              "environmentUrl": "${{ steps.target-url.outputs.url }}",
              "storedValues": {"storedValueName1": "Value"}
            }' \
            https://api.testrigor.com/api/v1/apps/${{ secrets.TESTRIGOR_APP_ID }}/retest

          sleep 10

          while true
          do
            echo " "
            echo "==================================="
            echo " Checking run status"
            echo "==================================="
            response=$(curl -i -o - -s -X GET 'https://api.testrigor.com/api/v1/apps/${{ secrets.TESTRIGOR_APP_ID }}/status' -H 'auth-token: ${{ secrets.TESTRIGOR_AUTH_TOKEN }}' -H 'Accept: application/json')
            code=$(echo "$response" | grep HTTP |  awk '{print $2}')
            body=$(echo "$response" | sed -n '/{/,/}/p')
            echo "Status code: " $code
            echo "Response: " $body
            case $code in
              4*|5*)
                # 400 or 500 errors
                echo "Error calling API"
                exit 1
                ;;
              200)
                # 200: successfully finished
                echo "Test finished successfully"
                exit 0
                ;;
              227|228)
                # 227: New - 228: In progress
                echo "Test is not finished yet"
                ;;
              229)
                # 229: Canceled
                echo "Test canceled"
                exit 1
                ;;
              230)
                # 230: Failed
                echo "Test finished but failed"
                exit 1
                ;;
              *)
                echo "Unknown status"
                exit 1
                ;;
            esac
            sleep 10
          done